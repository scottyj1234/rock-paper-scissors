<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissors</title>
    <script src="rock-paper-scissors.js" defer></script>
</head>
<body>
    <button id="rockBtn">Rock</button>
    <button id="paperBtn">Paper</button>
    <button id="scissorsBtn">Scissors</button>
    <div class="results">
        <div class="round"></div>
        <div class="last-player-move"></div>
        <div class="last-computer-move"></div>
        <div class="round-result"></div>
        <br>
        <div>CURRENT SCORES</div>
        <div class="player-score"></div>
        <div class="computer-score"></div>
    </div>
</body>
</html>
